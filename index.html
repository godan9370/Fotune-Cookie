<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARM Fortune Cookie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jacquard+12&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #F7F7F5;
      --fg: #0E0E0E;
      --mid: #999;
      --card-w: 148px;
      --card-h: 208px;
      --gap: 16px;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Space Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    /* ─────────────────────────────────────────
       LANDING
    ───────────────────────────────────────── */

    #landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 60px 40px;
      gap: 72px;
    }

    .landing-meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .site-label {
      font-size: 9px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--fg);
      opacity: 0.3;
      font-weight: 400;
    }

    .site-date {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--fg);
      opacity: 0.18;
      font-weight: 400;
    }

    #execute-btn {
      font-family: 'Jacquard 12', system-ui;
      font-size: 32px;
      line-height: 1;
      background: none;
      border: 1px solid var(--fg);
      color: var(--fg);
      padding: 18px 44px 16px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.18s ease, color 0.18s ease;
      position: relative;
      outline: none;
    }

    #execute-btn:hover {
      background: var(--fg);
      color: var(--bg);
    }

    #execute-btn:active {
      transform: scale(0.98);
    }

    /* ─────────────────────────────────────────
       CARDS SCREEN
    ───────────────────────────────────────── */

    #cards-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 80px 40px 100px;
      gap: 52px;
    }

    #cards-screen.visible {
      display: flex;
    }

    .deck-instruction {
      font-size: 9px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--fg);
      opacity: 0.28;
      font-weight: 400;
    }

    #card-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--gap);
      justify-content: center;
      max-width: calc((var(--card-w) * 4) + (var(--gap) * 3) + 2px);
    }

    /* ─────────────────────────────────────────
       CARD
    ───────────────────────────────────────── */

    .card-wrapper {
      width: var(--card-w);
      height: var(--card-h);
      perspective: 1100px;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      opacity: 0;
      animation: card-enter 0.5s ease forwards;
    }

    @keyframes card-enter {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.72s cubic-bezier(0.4, 0.0, 0.2, 1);
      will-change: transform;
    }

    /* Hover tilt effect (set via JS) */
    .card-wrapper:not(.flipped):hover .card-inner {
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }

    .card-face,
    .card-reveal {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }

    /* Front = tarot back (face-down) */
    .card-face img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    /* Back = cookie reveal */
    .card-reveal {
      transform: rotateY(180deg);
      background: #fff;
      display: flex;
      flex-direction: column;
    }

    .card-reveal .cookie-img {
      width: 100%;
      height: 76%;
      object-fit: cover;
      display: block;
    }

    .card-reveal-name {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 8px;
      font-size: 7.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.5;
      color: var(--fg);
      border-top: 1px solid rgba(0,0,0,0.07);
    }

    .card-wrapper.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-wrapper.flipped {
      cursor: default;
    }

    /* subtle border on hover (unflipped) */
    .card-wrapper:not(.flipped)::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px solid transparent;
      transition: border-color 0.2s ease;
      pointer-events: none;
    }

    .card-wrapper:not(.flipped):hover::after {
      border-color: rgba(0,0,0,0.15);
    }

    /* ─────────────────────────────────────────
       SPARKLE PARTICLES
    ───────────────────────────────────────── */

    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      animation: sparkle-out var(--dur, 0.9s) ease-out forwards;
      user-select: none;
      line-height: 1;
    }

    @keyframes sparkle-out {
      0%   { opacity: 1; transform: translate(0px, 0px) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.1) rotate(var(--rot)); }
    }

    /* ─────────────────────────────────────────
       READING MODAL
    ───────────────────────────────────────── */

    #reading-modal {
      position: fixed;
      inset: 0;
      background: rgba(247, 247, 245, 0.96);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    #reading-modal.open {
      opacity: 1;
      pointer-events: all;
    }

    .reading-inner {
      max-width: 420px;
      width: 100%;
      padding: 60px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .reading-img-wrap {
      width: 180px;
      height: 180px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .reading-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .reading-name {
      font-size: 9px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--fg);
      opacity: 0.35;
      text-align: center;
    }

    .reading-divider {
      width: 24px;
      height: 1px;
      background: var(--fg);
      opacity: 0.15;
    }

    .reading-horoscope {
      font-size: 13px;
      line-height: 1.95;
      letter-spacing: 0.01em;
      color: var(--fg);
      text-align: center;
      max-width: 340px;
      font-weight: 400;
      font-style: italic;
    }

    .reading-close {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      background: none;
      border: none;
      color: var(--fg);
      cursor: pointer;
      opacity: 0.2;
      transition: opacity 0.2s;
      padding: 8px 0;
      margin-top: 8px;
      outline: none;
    }

    .reading-close:hover {
      opacity: 0.6;
    }

    /* ─────────────────────────────────────────
       LOCKED DECK STATE
    ───────────────────────────────────────── */

    #card-grid.locked .card-wrapper:not(.flipped) {
      opacity: 0.22;
      pointer-events: none;
      cursor: default;
      transition: opacity 0.4s ease;
    }

    /* ─────────────────────────────────────────
       RESET
    ───────────────────────────────────────── */

    #reset-btn {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      background: none;
      border: none;
      color: var(--fg);
      cursor: pointer;
      opacity: 0.2;
      transition: opacity 0.2s;
      outline: none;
    }

    #reset-btn:hover {
      opacity: 0.55;
    }

    #reset-btn.active {
      opacity: 0.7;
      border-bottom: 1px solid var(--fg);
      padding-bottom: 1px;
    }

    #reset-btn.active:hover {
      opacity: 1;
    }

    /* ─────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────── */

    @media (max-width: 680px) {
      :root {
        --card-w: 130px;
        --card-h: 182px;
        --gap: 12px;
      }
      #execute-btn {
        font-size: 24px;
        padding: 14px 32px 12px;
      }
      #card-grid {
        max-width: calc((var(--card-w) * 3) + (var(--gap) * 2) + 2px);
      }
    }

    @media (max-width: 440px) {
      :root {
        --card-w: 110px;
        --card-h: 155px;
        --gap: 10px;
      }
      #card-grid {
        max-width: calc((var(--card-w) * 3) + (var(--gap) * 2) + 2px);
      }
    }

  </style>
</head>
<body>

  <!-- ── LANDING ── -->
  <div id="landing">
    <div class="landing-meta">
      <p class="site-label">ARM Fortune Cookie</p>
      <p class="site-date" id="today-date"></p>
    </div>
    <button id="execute-btn" onclick="dealCards()">execute fortunecookie.exe</button>
  </div>

  <!-- ── CARDS SCREEN ── -->
  <div id="cards-screen">
    <p class="deck-instruction">Select your biscuit</p>
    <div id="card-grid"></div>
    <button id="reset-btn" onclick="resetDeck()">reset</button>
  </div>

  <!-- ── READING MODAL ── -->
  <div id="reading-modal" onclick="closeReading(event)">
    <div class="reading-inner">
      <div class="reading-img-wrap">
        <img id="reading-img" src="" alt="">
      </div>
      <p class="reading-name" id="reading-name"></p>
      <div class="reading-divider"></div>
      <p class="reading-horoscope" id="reading-horoscope"></p>
      <button class="reading-close" onclick="closeReading()">close reading</button>
    </div>
  </div>

  <script>
    // ─── HELPERS ────────────────────────────────────────────────────────────────

    // Encode spaces in filenames for use in src attributes
    function src(filename) {
      return filename.split(' ').join('%20');
    }

    // Pick a random item from an array
    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    // ─── COOKIE DATA ────────────────────────────────────────────────────────────
    // Each cookie has 3 readings: good, bad, strange.
    // One is picked at random when the card is flipped.
    // Ginger Nut always says the same thing.
    // ────────────────────────────────────────────────────────────────────────────

    const COOKIES = [
      {

          // strange

        ]
      },
      {
        name: "McVities Digestives (Chocolate)",
        img: "Digestives Chocolate.jpg",
        readings: [
          // good
          "Mark forwarded your last piece of work to the whole team with 'this is the standard' in the subject line. You found out from Lills, not from Mark. This is fine. Better, even.",
          // bad
          "You sent Howard a clear, detailed email three days ago. He's seen it. This morning he asked you the same question in person, in front of the whole team, expecting the answer on the spot.",
          // strange
          "Haynes has walked past your desk four times today without saying anything. On the fifth pass he left a biscuit on your keyboard. Not a Tim Tam. A plain digestive. You don't know what it means and you're afraid to ask."
        ]
      },
      {
        name: "McVities Digestives (Caramel)",
        img: "Digestives Caramel.webp",
        readings: [
          // good
          "Lills messaged you after the meeting to say you handled it well. That's it. That's the whole message. It's the closest thing to a performance review you've received all year. Take it.",
          // bad
          "Neil told you the project was on hold until further notice. Further notice has arrived in the form of Howard pulling a chair up to your desk with his laptop open and the file already loaded.",
          // strange
          "Mark replied to your email with 'great' and then immediately followed up with 'actually can we loop in Jesse'. Jesse has not been looped in. The thread has gone completely quiet. You are still in it."
        ]
      },
      {
        name: "Arnott's Scotch Finger",
        img: "Scotch finger.jpg",
        readings: [
          // good
          "You were the only person in the meeting who said what everyone else was thinking. Howard wrote something down. Neil nodded once. In that room, that is a standing ovation.",
          // bad
          "Mark has delegated something to you with no context, no deadline, and no brief. The message says 'can you handle this one'. There is no attachment. There is no further reply. You have followed up twice.",
          // strange
          "You've been added to a recurring calendar invite with no title, no location, and no other attendees except Haynes. The invite says 'see agenda'. There is no agenda. It starts in forty minutes."
        ]
      },
      {
        name: "Arnott's Scotch Finger (Chocolate)",
        img: "Scotch Finger chcoolate.jfif",
        readings: [
          // good
          "Howard walked past your desk, paused, looked at your screen for a moment, and said 'yeah, that's the way' before continuing on. You didn't ask him to explain. You didn't need to.",
          // bad
          "Jesse sent you a ? in reply to something you spent two and a half hours on. Not a sentence. Not a follow-up question. One character. You've been looking at it for twenty minutes trying to decode the intent.",
          // strange
          "Neil mentioned your name in the all-team meeting as an example of something, then didn't finish the sentence and moved on. You were not asked to clarify. Three people have since messaged you asking what he meant."
        ]
      },
      {
        name: "Arnott's Raspberry Shortcake",
        img: "Shortcake Biscuit.jfif",
        readings: [
          // good
          "Lills goes out of her way to tell you that the idea you raised three weeks ago is now being used across the team. You weren't credited in the doc, but she told you in person. That was a deliberate choice on her part.",
          // bad
          "You were moved to a new project without being consulted. Howard described it as an exciting opportunity. Mark sent a one-line email about it at 5:53pm on a Friday. You found out at the same time as everyone else.",
          // strange
          "Haynes reacted to your Slack message with a strawberry emoji and then immediately removed the reaction. The message was about a deadline. You've been thinking about it for an hour. Nobody will acknowledge it happened."
        ]
      },
      {
        name: "Wagon Wheel",
        img: "Wagon Wheel.webp",
        readings: [
          // good
          "Something you raised in a retro eight months ago has quietly become policy. Nobody announced it. You noticed it in the updated docs. Neil was the one who pushed it through. He didn't tell you either. The wheel turned.",
          // bad
          "A ticket you closed four months ago has been reopened and reassigned to you with a new priority attached. Howard has been added as a watcher. There is a comment from Jesse that just says 'thoughts?'",
          // strange
          "Mark described your work style in a meeting as 'wagon wheel energy'. Everyone laughed, including you. On the walk back to your desk you realised you still have no idea if it was a compliment or not."
        ]
      },
      {
        name: "Country Cheese (Fake Chedz)",
        img: "Country Cheese.avif",
        readings: [
          // good
          "You were quietly compared to someone more senior and came out looking better. Nobody said it out loud, but Howard made a point of speaking to you first after the review. You are not the reference implementation. You're what they actually wanted.",
          // bad

          // strange

        ]
      },
      {
        name: "Iced Vovo",
        img: "Iced vovo.jpg",
        readings: [
          // good

          // bad
          "Howard has pulled a chair up to your desk with his laptop open. He has questions about something you submitted two weeks ago. You thought it was done. He has six tabs open. It is not done.",
          // strange
          "Jesse forwarded your work to someone outside the team with no context. You found out when that person replied directly to you with 'so I heard you're the one to ask about this'. You are not sure that you are."
        ]
      },
      {
        name: "Lemon Crisp Cream",
        img: "Lemon Crisp Cream.avif",
        readings: [
          // good
          "You said something in the meeting that made the room pause. Mark looked at his notes. Neil looked at Mark. Then the conversation moved forward — in the direction you pointed. That was you.",
          // bad
          "Your feedback on the document has been marked as resolved in the revision history without being addressed. Lills has closed it. You've sent a follow-up asking for clarification. Mark replied 'yep'.",
          // strange
          "Howard emailed you directly, which has never happened before. The subject line is blank. The body is two sentences that don't quite connect to each other. You've read it six times. You replied. He hasn't opened it."
        ]
      },
      {
        name: "Monte Carlo Cream",
        img: "Monte Carlo.jpg",
        readings: [
          // good
          "Lills tells you the meeting you've been dreading has been cancelled. Neil made that call. You don't know why and you don't need to. Something has been quietly handled on your behalf. Accept it without asking questions.",
          // bad
          "You are now across four separate threads with Mark about the same topic. Each has a slightly different subject line. None reference the others. Mark doesn't know there are four. You have to be the one to consolidate them.",
          // strange
          "Haynes scheduled a meeting with you, joined it, said nothing for eight minutes, then said 'just wanted to check in' and ended the call. There was a shared document open the entire time. It was blank. No follow-up has been sent."
        ]
      },
      {
        name: "Ginger Nut",
        img: "Ginger Nut.jpg",
        readings: [
          "You are Ginger Nut.",
          "You are Ginger Nut.",
          "You are Ginger Nut."
        ]
      },
      {
        name: "Tim Tam",
        img: "Timtam.jpg",
        readings: [
          // good
          "Neil has sent you a message that says 'you're on it'. Three words. No context needed. Howard is already aware. Lills has updated the board. You know what to do. Go full Tim Tam Slam — give it everything.",
          // bad
          "Lills has added you to three new workstreams in one afternoon. Mark has sent a brief for a fourth with 'quick one' in the subject line. Howard has walked past twice asking 'how are we going' without slowing down for the answer. You are the Tim Tam at the bottom of the packet.",
          // strange
          "Jesse has sent a calendar invite titled 'touch base re: everything'. Fifteen minutes. Twelve attendees. You don't know if you're expected to present. The invite was sent at 11:47pm. There is an agenda item that appears to be named after you."
        ]
      }
    ];

    // ─── DATE ───────────────────────────────────────────────────────────────────

    const now = new Date();
    document.getElementById('today-date').textContent =
      now.toLocaleDateString('en-AU', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      }).toUpperCase();

    // ─── STATE ──────────────────────────────────────────────────────────────────

    let deckLocked = false;

    // ─── DEAL CARDS ─────────────────────────────────────────────────────────────

    function dealCards() {
      document.getElementById('landing').style.display = 'none';
      deckLocked = false;

      const screen = document.getElementById('cards-screen');
      screen.classList.add('visible');

      const grid = document.getElementById('card-grid');
      grid.innerHTML = '';
      grid.classList.remove('locked');

      const resetBtn = document.getElementById('reset-btn');
      resetBtn.textContent = 'reshuffle';
      resetBtn.classList.remove('active');

      // Pre-assign a random reading to each cookie for this deal
      const shuffled = [...COOKIES]
        .sort(() => Math.random() - 0.5)
        .map(c => ({ ...c, chosenReading: pick(c.readings) }));

      shuffled.forEach((cookie, i) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        wrapper.style.animationDelay = `${i * 0.055}s`;

        wrapper.innerHTML = `
          <div class="card-inner">
            <div class="card-face">
              <img src="${src('Tarot Card Back.png')}" alt="">
            </div>
            <div class="card-reveal">
              <img class="cookie-img" src="${src(cookie.img)}" alt="${cookie.name}">
              <div class="card-reveal-name">${cookie.name}</div>
            </div>
          </div>
        `;

        wrapper.addEventListener('mousemove', (e) => onCardHover(e, wrapper));
        wrapper.addEventListener('mouseleave', () => resetTilt(wrapper));
        wrapper.addEventListener('click',      () => flipCard(wrapper, cookie));

        grid.appendChild(wrapper);
      });
    }

    // ─── CARD TILT ──────────────────────────────────────────────────────────────

    function onCardHover(e, wrapper) {
      if (wrapper.classList.contains('flipped') || deckLocked) return;
      const rect  = wrapper.getBoundingClientRect();
      const cx    = rect.left + rect.width  / 2;
      const cy    = rect.top  + rect.height / 2;
      const dx    = (e.clientX - cx) / (rect.width  / 2);
      const dy    = (e.clientY - cy) / (rect.height / 2);
      const inner = wrapper.querySelector('.card-inner');
      inner.style.transition = 'transform 0.1s ease, box-shadow 0.1s ease';
      inner.style.transform  = `rotateY(${dx * 8}deg) rotateX(${-dy * 8}deg) translateY(-6px) scale(1.03)`;
      inner.style.boxShadow  = `${-dx * 12}px ${-dy * 12 + 12}px 36px rgba(0,0,0,0.14)`;
    }

    function resetTilt(wrapper) {
      if (wrapper.classList.contains('flipped')) return;
      const inner = wrapper.querySelector('.card-inner');
      inner.style.transition = 'transform 0.35s ease, box-shadow 0.35s ease';
      inner.style.transform  = '';
      inner.style.boxShadow  = '';
    }

    // ─── FLIP ───────────────────────────────────────────────────────────────────

    function flipCard(wrapper, cookie) {
      if (wrapper.classList.contains('flipped') || deckLocked) return;

      deckLocked = true;

      const inner = wrapper.querySelector('.card-inner');
      inner.style.transition = 'transform 0.72s cubic-bezier(0.4, 0.0, 0.2, 1), box-shadow 0.3s ease';
      inner.style.transform  = '';
      inner.style.boxShadow  = '';

      wrapper.classList.add('flipped');

      // Lock remaining cards
      document.getElementById('card-grid').classList.add('locked');

      // Activate reshuffle button
      const resetBtn = document.getElementById('reset-btn');
      resetBtn.textContent = 'reshuffle the deck';
      setTimeout(() => resetBtn.classList.add('active'), 900);

      // Sparkles
      const rect = wrapper.getBoundingClientRect();
      burst(rect.left + rect.width / 2, rect.top + rect.height / 2);

      // Open modal after flip
      setTimeout(() => openReading(cookie), 780);
    }

    // ─── SPARKLE BURST ──────────────────────────────────────────────────────────

    const GLYPHS = ['✦', '✧', '⋆', '✺', '✹', '∗', '⁎', '✼', '+', '×'];

    function burst(cx, cy) {
      const n = 22;
      for (let i = 0; i < n; i++) {
        const el    = document.createElement('span');
        const angle = (i / n) * 360 + (Math.random() * 20 - 10);
        const dist  = 50 + Math.random() * 90;
        const tx    = Math.cos(angle * Math.PI / 180) * dist;
        const ty    = Math.sin(angle * Math.PI / 180) * dist;
        const size  = 10 + Math.random() * 14;
        const dur   = 0.7 + Math.random() * 0.45;
        const rot   = (Math.random() * 360 - 180) + 'deg';
        const delay = Math.random() * 0.18;

        el.className = 'sparkle';
        el.textContent = GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
        el.style.cssText = `
          left: ${cx - size / 2}px;
          top:  ${cy - size / 2}px;
          font-size: ${size}px;
          --tx:  ${tx}px;
          --ty:  ${ty}px;
          --dur: ${dur}s;
          --rot: ${rot};
          animation-delay: ${delay}s;
        `;

        document.body.appendChild(el);
        setTimeout(() => el.remove(), (dur + delay + 0.1) * 1000);
      }
    }

    // ─── READING MODAL ──────────────────────────────────────────────────────────

    function openReading(cookie) {
      document.getElementById('reading-img').src              = src(cookie.img);
      document.getElementById('reading-img').alt              = cookie.name;
      document.getElementById('reading-name').textContent     = cookie.name;
      document.getElementById('reading-horoscope').textContent = cookie.chosenReading;
      document.getElementById('reading-modal').classList.add('open');
    }

    function closeReading(e) {
      if (e && e.target !== document.getElementById('reading-modal') &&
          !e.target.classList.contains('reading-close')) return;
      document.getElementById('reading-modal').classList.remove('open');
    }

    // ─── RESET ──────────────────────────────────────────────────────────────────

    function resetDeck() {
      document.getElementById('reading-modal').classList.remove('open');
      document.getElementById('cards-screen').classList.remove('visible');
      document.getElementById('landing').style.display = 'flex';
      deckLocked = false;
    }

  </script>
</body>
</html>
